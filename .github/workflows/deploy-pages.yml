name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            oddbridge/package-lock.json
            floret/package-lock.json
            scoop/package-lock.json

      - name: Build Oddbridge
        env:
          REPO: ${{ github.event.repository.name }}
        run: |
          cd oddbridge
          npm ci
          npm run build -- --base=/${REPO}/oddbridge/

      - name: Build Floret
        env:
          REPO: ${{ github.event.repository.name }}
        run: |
          cd floret
          npm ci
          npm run build -- --base=/${REPO}/floret/

      - name: Build Scoop
        env:
          REPO: ${{ github.event.repository.name }}
        run: |
          cd scoop
          npm ci
          npm run build -- --base=/${REPO}/scoop/

      - name: Assemble site
        run: |
          mkdir -p _site/oddbridge _site/floret _site/scoop
          cp github-pages-hub/index.html _site/index.html
          cp -r oddbridge/dist/. _site/oddbridge/
          cp -r floret/dist/. _site/floret/
          cp -r scoop/dist/. _site/scoop/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
