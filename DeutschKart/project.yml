# XcodeGen: https://github.com/yonaskolb/XcodeGen
# Run: xcodegen generate
name: DeutschKart
options:
  bundleIdPrefix: com.deutschkart
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: NO
targets:
  DeutschKart:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.deutschkart.DeutschKart
      INFOPLIST_FILE: Sources/App/Info.plist
    entitlements:
      path: Sources/App/App.entitlements
    dependencies:
      - target: DeutschKartWidgetExtension
        embed: true
  DeutschKartWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
      - path: Sources/Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.deutschkart.DeutschKart.widget
      INFOPLIST_FILE: Sources/Widget/Info.plist
    entitlements:
      path: Sources/Widget/WidgetExtension.entitlements
